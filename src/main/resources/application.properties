spring.application.name=resourcehub
spring.datasource.url=jdbc:postgresql://localhost:5433/resourcehub
spring.datasource.username=resourcehub_user
spring.datasource.password=resourcehub_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.formate_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect